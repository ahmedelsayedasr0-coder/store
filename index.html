<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام الموارد البشريه</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box }
    body { overflow: hidden; height: 100vh; width: 100vw }
    #frameWrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    #frameWrap iframe {
      width: 100%;
      height: calc(100% + 80px);
      border: 0;
      margin-top: -80px;
      display: block;
    }
    .loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f7f6;
      z-index: 999;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 18px;
      color: #1e3a8a;
      font-weight: 700;
      transition: opacity 0.4s;
    }
    .loading.hide { opacity: 0; pointer-events: none }
    .spinner {
      width: 40px; height: 40px;
      border: 5px solid #e2e8f0;
      border-top-color: #1e3a8a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <span>جاري تحميل النظام...</span>
    <div class="spinner"></div>
  </div>
  <div id="frameWrap">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbw7b1orXXNNLT30t_fc-NkUQ_8ricVFNhuqHg1z0FHVp8RE0KHQvCXnjIyzFCZRHtTQ/exec"
      allow="camera;microphone;fullscreen"
      sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals"
      onload="onFrameLoad()"
    ></iframe>
  </div>
  <script>
    function onFrameLoad() {
      document.getElementById('loading').classList.add('hide');
    }
  </script>
</body>
</html>
